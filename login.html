<!DOCTYPE html>
<html>
    <head>
      <meta name="viewport" content = "width=device-width, initial-scale=1">
      <meta charset="utf-8">
      
      <script src = "https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
      <title>SongPix Log In</title>
      

    </head>
    <body>
      
          <div class="row">
            <div class="col">
              <form id="login-form" method="post" action="">
                <div class="mb-3">
    <label class="form-label" for="login_email">Email address</label>
    <input type="email" class="form-control" id="login_email" name="email">
</div>
<div class="mb-3">
    <label class="form-label" for="login_password">Password</label>
    <input type="password" class="form-control" id="login_password" name="password">
</div>
<button type="submit" name="login" value="1" class="btn btn-studenteat">Login</button>

</form> 

            </div>
            <div class="col">
              <form id="registration-form" method="post" action="">
                <div class="mb-3">
    <label class="form-label" for="reg_email">Email address</label>
    <input type="email" class="form-control" id="reg_email" name="email">
</div>
<div class="mb-3">
    <label class="form-label" for="reg_password">Password</label>
    <input type="password" class="form-control" id="reg_password" name="password">
</div>
<div class="mb-3">
    <label class="form-label" for="reg_password_confirm">Confirm Password</label>
    <input type="password" class="form-control" id="reg_password_confirm" name="password_confirm">
</div>
<button type="submit" name="register" value="1" class="btn btn-primary">Register</button>   

</form> 

    <link rel="stylesheet" href = "./css/styles.css">
    </body>
</html>
